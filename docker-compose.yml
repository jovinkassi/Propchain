version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: propchain
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: propchain_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  api:
    build:
      context: ./backend/api
      dockerfile: Dockerfile
    environment:
      PORT: 4001
      DATABASE_URL: postgres://postgres:propchain_dev@postgres:5432/propchain
      JWT_SECRET: dev_jwt_secret_change_in_prod
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:8081
    ports:
      - "4001:4001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/api/src:/app/src

  indexer:
    build:
      context: ./backend/indexer
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://postgres:propchain_dev@postgres:5432/propchain
      RPC_URL: ${RPC_URL}
      PROPERTY_TOKEN_ADDRESS: ${PROPERTY_TOKEN_ADDRESS}
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy

  analytics:
    build:
      context: ./backend/analytics
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://postgres:propchain_dev@postgres:5432/propchain
    ports:
      - "3003:3003"
    depends_on:
      postgres:
        condition: service_healthy

  ai:
    build:
      context: ./backend/ai
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://postgres:propchain_dev@postgres:5432/propchain
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      MONGODB_URL: mongodb://mongo:27017
    ports:
      - "3004:3004"
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_started

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4001
      NEXT_PUBLIC_AI_URL: http://localhost:3004
      NEXT_PUBLIC_CHAIN_ID: 1337
    ports:
      - "3005:3000"
    depends_on:
      - api
      - ai

volumes:
  postgres_data:
  mongo_data:
